<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LinkLoad</title>
    <meta name="description" content="Download audio or video instantly with LinkLoad.">
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- Background element generating the beautiful top gradient -->
    <div class="ambient-background"></div>

    <main class="app-container">
        <header>
            <div class="logo-area">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="logo-icon">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span class="logo-text">LinkLoad</span>
            </div>
            <h1>Download Media,<br> Fast & <span class="text-accent">Free.</span></h1>
        </header>

        <!-- INPUT FLOW: Link Collection -->
        <div id="form-container">
            <form id="url-form">
                <div class="input-group frosted">
                    <input type="url" id="link-input" placeholder="Paste your link here..." required autocomplete="off"
                        spellcheck="false">
                </div>
                <button type="submit" id="fetch-btn" class="btn-primary btn-gradient" style="margin-top: 24px;">
                    <span class="btn-text">Next</span>
                    <span class="spinner hidden" id="fetch-spinner"></span>
                </button>
            </form>
            <div id="error-message" class="error-msg frosted hidden" style="margin-top: 16px;"></div>
        </div>

        <!-- RESULT FLOW: Options & Download Status -->
        <div id="result-view" class="result-view hidden">
            <!-- Media Preview stays persistent across both result interactions -->
            <div class="media-card frosted">
                <div class="media-thumb">
                    <img id="media-thumb" src="" alt="Thumbnail">
                    <span id="media-duration" class="duration-badge hidden"></span>
                </div>
                <div class="media-info">
                    <h3 id="media-title"></h3>
                    <span id="media-source" class="source-badge frosted-badge"></span>
                </div>
            </div>

            <!-- Pre-Download Options -->
            <div id="options-view" class="options-view">
                <div class="options-group">
                    <div class="segmented-control frosted">
                        <div class="segment-active-bg" id="segment-active-bg"></div>
                        <div class="segment-btn active" data-type="video">Video</div>
                        <div class="segment-btn" data-type="audio">Audio</div>
                    </div>

                    <div class="select-container">
                        <label>Quality format</label>
                        <div class="dropdown" id="quality-dropdown">
                            <div class="dropdown-trigger frosted">
                                <span class="dropdown-value" id="dropdown-value-text">High (1080p)</span>
                                <svg class="chevron" width="16" height="16" viewBox="0 0 24 24">
                                    <path d="M7 10l5 5 5-5z" />
                                </svg>
                            </div>
                            <div class="dropdown-menu frosted-menu" id="dropdown-menu">
                                <!-- Options rendered by JS -->
                            </div>
                        </div>
                    </div>
                </div>

                <button id="download-btn" class="btn-primary btn-gradient action-btn" style="margin-top: 24px;">
                    Download
                </button>
            </div>

            <!-- Post-Download Status Flow -->
            <div id="post-download-view" class="post-download-view hidden frosted">
                <div class="status-indicator">
                    <div class="success-icon" style="margin-bottom: 8px;">
                        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" class="text-accent">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M22 4L12 14.01l-3-3" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                    <p class="status-summary">Download Started!</p>
                    <p class="status-sub">Your file is now being downloaded by your browser.</p>
                </div>
                <button id="reset-btn" class="btn-secondary">
                    Process Another Link
                </button>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
